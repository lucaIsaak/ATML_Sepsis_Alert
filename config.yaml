data:
  mimic_base: "physionet.org/files/mimiciv/3.1"
  icu_path: "physionet.org/files/mimiciv/3.1/icu"
  hosp_path: "physionet.org/files/mimiciv/3.1/hosp"
  processed_path: "data/processed"

cohort:
  min_icu_los_hours: 6          # minimum ICU stay length to include
  prediction_horizon_hours: 6   # predict sepsis N hours before onset
  lookback_window_hours: 24     # feature window size

model:
  artifact_path: "models/sepsis_model.pkl"
  num_leaves: 31          # Optuna best (trial 47, CV AUROC 0.8297)
  learning_rate: 0.0163
  n_estimators: 859
  min_child_samples: 95
  class_weight: "balanced"

narrative:
  provider: "ollama"            # "ollama" | "claude" | "huggingface"
  ollama_model: "mistral:7b"
  ollama_base_url: "http://localhost:11434"
  max_tokens: 300

agent:
  risk_threshold: 0.4           # trigger alert above this score
  poll_interval_seconds: 60     # how often agent checks for new data (simulation)

app:
  title: "SepsisAlert — ICU Early Warning"

feedback_agent:
  min_records_to_act:    10    # minimum clinical feedback records before acting
  min_narrative_to_act:   5    # minimum narrative ratings before acting
  flag_rating_below:    2.5    # flag if mean narrative rating falls below this
  flag_rating_std:      1.5    # flag if rating std exceeds this (clinician disagreement)
  flag_fp_rate_above:   0.40   # flag if false positive rate exceeds this
  retrain_min_confirmed:  5    # minimum confirmed-sepsis labels to trigger retrain
  retrain_fp_rate_above: 0.30  # retrain if FP rate exceeds this (and min confirmed met)
