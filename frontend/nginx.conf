server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/ requests to the FastAPI container.
    # proxy_buffering off is required for streaming narratives (Server-Sent Events).
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
    }

    # React SPA — serve index.html for all non-asset routes
    location / {
        try_files $uri /index.html;
    }
}
