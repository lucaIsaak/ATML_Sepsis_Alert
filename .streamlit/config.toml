# ──────────────────────────────────────────────────────────────────────────────
# SepsisAlert — Streamlit configuration
#
# Changes here apply immediately on the next server restart (no code changes).
# Docs: https://docs.streamlit.io/develop/api-reference/configuration
# ──────────────────────────────────────────────────────────────────────────────

# ── Visual theme ──────────────────────────────────────────────────────────────
# These are the only 5 knobs Streamlit exposes natively.
# Everything else (card shadows, custom fonts, etc.) must be done via
# st.markdown("<style>...</style>", unsafe_allow_html=True) in Python.
[theme]
primaryColor             = "#0284c7"   # Ocean blue — buttons, radio dots, tab underlines,
                                       # sliders, checkboxes, focus rings, progress bars
backgroundColor          = "#ffffff"   # Main page background
secondaryBackgroundColor = "#f0f2f5"   # Sidebar + widget input backgrounds
textColor                = "#111827"   # All body text
font                     = "sans serif"  # Options: "sans serif" | "serif" | "monospace"

# ── Server ─────────────────────────────────────────────────────────────────────
[server]
port            = 8501          # Change if 8501 is taken
headless        = false         # true = no browser auto-open (useful on servers)
runOnSave       = true          # Auto-reload when a .py file is saved — huge DX win
# maxUploadSize = 200           # MB — raise if uploading large files

# ── Browser ───────────────────────────────────────────────────────────────────
[browser]
gatherUsageStats = false        # Don't send telemetry to Streamlit

# ── Client UI ─────────────────────────────────────────────────────────────────
[client]
toolbarMode = "minimal"         # "auto" | "minimal" | "viewer" | "developer"
                                # "minimal" hides the top-right deploy/share buttons
                                # keeping the UI clean for clinical use
